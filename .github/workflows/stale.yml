# Marks issues as stale after 23 days of inactivity and closes them 7 days
# later, for a total of 30 days from last activity to auto-close.
#
# Any comment or update resets the clock and removes the `stale` label.
# Maintainers can add `keep-open` to exempt an issue permanently.
#
# Pull requests are left untouched (days-before-pr-stale: -1).
#
# See https://github.com/actions/stale for all options.
name: Close stale issues

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 23
          days-before-issue-close: 7
          stale-issue-label: stale
          exempt-issue-labels: "pinned,security,good first issue,help wanted,keep-open"
          stale-issue-message: |
            This issue has had no activity for 23 days and will be closed in
            7 days if there is no further activity.

            - Add a comment to keep it open.
            - A maintainer can add the `keep-open` label to exempt it from
              auto-close.
          close-issue-message: |
            Closing due to inactivity. If this is still relevant, please
            reopen the issue or file a new one with fresh reproduction steps.
          days-before-pr-stale: -1
          days-before-pr-close: -1
          operations-per-run: 100
          remove-stale-when-updated: true
