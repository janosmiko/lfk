# Builds and publishes a GitHub release (with Homebrew formula) on version tags.
# Stable tags (v1.2.3) produce a full release with "latest" Docker tag.
# Nightly tags (v1.2.3-nightly*) produce a pre-release with "nightly" Docker tag.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      is_nightly: ${{ steps.check.outputs.is_nightly }}
      nightly_date: ${{ steps.check.outputs.nightly_date }}
      goreleaser_config: ${{ steps.check.outputs.goreleaser_config }}
    steps:
      - name: Detect release type
        id: check
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          TAG="${TAG_REF#refs/tags/}"
          if [[ "$TAG" == *-nightly* ]]; then
            echo "is_nightly=true" >> "$GITHUB_OUTPUT"
            echo "goreleaser_config=.goreleaser.nightly.yaml" >> "$GITHUB_OUTPUT"
            # Extract date from tag (v1.2.3-nightly.20260414 -> nightly-20260414)
            # or use today's date if tag is just v1.2.3-nightly
            DATE_PART="${TAG##*-nightly}"
            if [[ -n "$DATE_PART" && "$DATE_PART" == .* ]]; then
              echo "nightly_date=nightly-${DATE_PART#.}" >> "$GITHUB_OUTPUT"
            else
              echo "nightly_date=nightly-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "is_nightly=false" >> "$GITHUB_OUTPUT"
            echo "goreleaser_config=.goreleaser.stable.yaml" >> "$GITHUB_OUTPUT"
            echo "nightly_date=" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  release:
    needs: [detect, build-and-test, lint, govulncheck]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config ${{ needs.detect.outputs.goreleaser_config }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          NIGHTLY_DATE: ${{ needs.detect.outputs.nightly_date }}
